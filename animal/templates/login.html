<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link rel="icon" href="{{ url_for('static', filename='animal.ico') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background-color:#e5e5e5;">

<div class="container">

<div class="row justify-content-center align-items-center vh-100">

<div class="col-md-8 col-lg-6">

<div class="card shadow-lg border-0 rounded-4 text-white bg-animal">
<style>
.bg-animal{
background-image:url("{{ url_for('static', filename='animal.jpg') }}");
background-size:cover;
background-position:center;
min-height:500px;
}
</style>
<div class="card-body p-5 text-center"
style="background: rgba(0,0,0,0.5); border-radius:20px;">

<h3 class="text-center">🐾 Animal Database</h3>
<p class="text-center mb-4">
Please login to access the animal management system
</p>

<form method="POST" autocomplete="off">

<div class="mb-3">
<input type="text" name="username" class="form-control form-control-lg" placeholder="Username" autocomplete="off">
</div>

<div class="mb-3">
<input type="password" name="password" class="form-control form-control-lg" placeholder="Password" autocomplete="new-password">

{% if error %}
<div class="text-danger mt-2">
    {{ error }}
</div>
{% endif %}

</div>

<button class="btn btn-primary btn-lg w-100 rounded-3">Login</button>

</form>
<hr>

<div class="text-center">
<a href="/register">Create account</a>
</div>

</div>
</div>

</div>

</div>

</div>

</body>
</html>
