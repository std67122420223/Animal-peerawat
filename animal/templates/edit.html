<!DOCTYPE html>
<html>
<head>
<title>Edit Animal</title>

<link rel="icon" href="{{ url_for('static', filename='animal.ico') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container-fluid mt-5">

<h1 class="text-center mb-4">Edit Animal 🐾</h1>

<div class="row justify-content-center">
<div class="col-lg-8">

<div class="card p-5 shadow">

<form method="POST" enctype="multipart/form-data">

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" name="name" class="form-control" value="{{animal.name}}">
</div>

<div class="mb-3">
<label class="form-label">Species</label>
<input type="text" name="species" class="form-control" value="{{animal.species}}">
</div>

<div class="mb-3">
<label class="form-label">Habitat</label>

<select name="habitat" class="form-control">

<option value="Land" {% if animal.habitat == "Land" %}selected{% endif %}>Land</option>
<option value="Water" {% if animal.habitat == "Water" %}selected{% endif %}>Water</option>

</select>

</div>

<div class="mb-3">
<label class="form-label">Legs</label>
<select name="legs" class="form-control">
    <option value="0" {% if animal.legs == 0 %}selected{% endif %}>0</option>
    <option value="1" {% if animal.legs == 1 %}selected{% endif %}>1</option>
    <option value="2" {% if animal.legs == 2 %}selected{% endif %}>2</option>
    <option value="3" {% if animal.legs == 3 %}selected{% endif %}>3</option>
    <option value="4" {% if animal.legs == 4 %}selected{% endif %}>4</option>
</select>
</div>
<div class="mb-3">
<label>Image URL</label>
<input type="text" name="image_url" class="form-control" 
value="{{ animal.image }}" placeholder="Paste image link">
{% if animal.image %}
<div class="mt-3">
<img src="{{ animal.image }}" width="120">
</div>
{% endif %}
</div>

<button type="submit" class="btn btn-primary">Update</button>
<a href="/animals" class="btn btn-secondary">Back</a>

</form>

</div>
</div>
</div>

</body>
</html>
