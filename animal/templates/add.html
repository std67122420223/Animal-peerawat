<!DOCTYPE html>
<html>
<head>

<title>Add Animal</title>

<link rel="icon" href="{{ url_for('static', filename='animal.ico') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container-fluid mt-5">

<h1 class="mb-4 text-center">Add Animal 🐾</h1>

<div class="row justify-content-center">
<div class="col-md-9 col-lg-8">

<div class="card p-4 shadow">

<form method="POST">

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" name="name" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Species</label>
<input type="text" name="species" class="form-control" required>
</div>
<div class="mb-3">
<label class="form-label">Habitat</label>

<select name="habitat" class="form-control">

<option value="Land">Land Animal</option>
<option value="Water">Water Animal</option>

</select>

</div>
<div class="mb-3">
<label class="form-label">Legs</label>

<select name="legs" class="form-control">

<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>

</select>
</div>

<button type="submit" class="btn btn-success">Save</button>

<a href="/animals" class="btn btn-secondary">Back</a>

</form>

</div>
</div> 
</div>

</body>
</html>
