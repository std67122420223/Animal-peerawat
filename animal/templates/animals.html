<!DOCTYPE html>
<html>
<head>

<title>Animal Database</title>

<link rel="icon" href="{{ url_for('static', filename='animal.ico') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body{
background-image:url("{{ url_for('static', filename='animal.jpg') }}");
background-size:cover;
background-position:center;
background-attachment:fixed;
}


.container{
background:rgba(255,255,255,0.9);
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}


.table{
border-radius:15px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}


.table-orange{
background:linear-gradient(45deg,#ff8c00,#ff6a00);
color:white;
}

.table-orange th{
color:white;
}


.table tbody tr:hover{
background:#fff3e0;
}


.table img{
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.25);
}

</style>
</head>

<body>
<div class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Animal Database</h1>
<div>
    <a href="/change_password" class="btn btn-warning me-2">Change Password</a>
    <a href="/logout" class="btn btn-secondary">Logout</a>
</div>
</div>

<form method="GET" action="/" class="mb-3">

<div class="input-group">

<input type="text" name="search" class="form-control" placeholder="Search animals">

<button class="btn btn-primary">Search</button>

</div>

</form>

<a href="/add" class="btn btn-success mb-3">+ Add Animal</a>

<table class="table table-bordered table-striped">

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Species</th>
<th>Habitat</th>
<th>Legs</th>
<th>Image</th>
<th>Action</th>
</tr>

<thead class="table-orange">

<tbody>

{% for animal in animals %}

<tr>

<td>{{animal.id}}</td>
<td>{{animal.name}}</td>
<td>{{animal.species}}</td>
<td>{{animal.habitat}}</td>
<td>{{animal.legs}}</td>

<td>
{% if animal.image %}
<img src="{{ animal.image }}" style="width:150px; height:100px; object-fit:cover; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.2);">
{% else %}
No Image
{% endif %}
</td>

<td>

<a href="/edit/{{animal.id}}" class="btn btn-warning btn-sm">Edit</a>

<a href="/delete/{{animal.id}}" class="btn btn-danger btn-sm">Delete</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>
</div>
</body>
</html>
