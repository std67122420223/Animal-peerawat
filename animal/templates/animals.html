<!DOCTYPE html>
<html>
<head>

<title>Animal Database</title>

<link rel="icon" href="{{ url_for('static', filename='animal.ico') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

<h1 class="mb-4">Animal Database</h1>

<a href="/logout" class="btn btn-secondary mb-3">Logout</a>

<form method="GET" action="/" class="mb-3">

<div class="input-group">

<input type="text" name="search" class="form-control" placeholder="Search animals">

<button class="btn btn-primary">Search</button>

</div>

</form>

<a href="/add" class="btn btn-success mb-3">+ Add Animal</a>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Name</th>
<th>Species</th>
<th>Habitat</th>
<th>Legs</th>
<th>Action</th>
</tr>

</thead>

<tbody>

{% for animal in animals %}

<tr>

<td>{{animal.id}}</td>
<td>{{animal.name}}</td>
<td>{{animal.species}}</td>
<td>{{animal.habitat}}</td>
<td>{{animal.legs}}</td>
<td>

<a href="/edit/{{animal.id}}" class="btn btn-warning btn-sm">Edit</a>

<a href="/delete/{{animal.id}}" class="btn btn-danger btn-sm">Delete</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</body>
</html>
